version: '3.8'

services:
  nizhal-ml-backend:
    build: 
      context: ./ml
      dockerfile: Dockerfile
    container_name: nizhal-ml-backend
    ports:
      - "8000:8000"
    env_file:
      - ./ml/.env
    # To use your own certificates, uncomment below and place cert.pem/key.pem in ./ml/certs/
    # NOTE: Copy ml/.env.example to ml/.env before running: cp ml/.env.example ml/.env
    # volumes:
    #   - ./ml/certs:/app/certs:ro
    restart: unless-stopped
